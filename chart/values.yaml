postgresql:
  enabled: true
  auth:
    username: devin
    password: password
    database: auth
  initdbScripts:
    init.sql: |
      CREATE DATABASE gg;
      GRANT ALL PRIVILEGES ON DATABASE gg TO devin;
      CREATE DATABASE auth;
      GRANT ALL PRIVILEGES ON DATABASE auth TO devin;

auth-backend:
  image:
    repository: 10.10.10.245:5000/devin/auth_backend
    tag: "stable"
    pullPolicy: Always
  replicaCount: 1
  port: 3000
  env:
    RUST_LOG: info


gradegetter:
  image:
    repository: 10.10.10.245:5000/devin/gradegetter
    tag: "stable"
    pullPolicy: Always
  replicaCount: 1
  port: 3001
  env:
    PUPPETEER_EXECUTABLE_PATH: /usr/lib/chromium/chromium
    RUST_LOG: info


gradegetter-backend:
  image:
    repository: 10.10.10.245:5000/devin/gradegetter_backend
    tag: "stable"
    pullPolicy: Always
  replicaCount: 1
  port: 3002
  env:
    RUST_LOG: info


notification-backend:
  image:
    repository: 10.10.10.245:5000/devinn/notification_backend
    tag: "stable"
    pullPolicy: Always
  replicaCount: 1
  port: 3003
  env:
    RUST_LOG: info

nanopass-backend:
  image:
    repository: 10.10.10.245:5000/devin/nanopass_backend
    tag: "stable"
    pullPolicy: Always
  replicaCount: 1
  port: 3004
  env:
    RUST_LOG: info

secretName: devinlittle-net-secrets
imagePullSecret: registry-creds

ingress:
  enabled: true
  hostname: api.example.com
  class: nginx
  annotations:
    kubernetes.io/ingress.class: nginx
