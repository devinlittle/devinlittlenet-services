postgresql:
  enabled: true
  databases:
    - name: auth
      owners: devin
    - name: gg
      owners: devin
  users:
    - name: devin
      password: password
  auth:
    username: devin
    password: password
    database: auth
  gg:
    database: gg

auth_backend:
  image:
    repository: 10.10.10.245:5000/devin/auth_backend
    tag: "stable"
    pullPolicy: Always
  replicaCount: 1
  port: 3000
  env:
    RUST_LOG: info


gradegetter_backend:
  image:
    repository: 10.10.10.245:5000/devin/gradegetter_backend
    tag: "stable"
    pullPolicy: Always
  replicaCount: 1
  port: 3002
  env:
    RUST_LOG: info

gradegetter:
  image:
    repository: 10.10.10.245:5000/devin/gradegetter
    tag: "stable"
    pullPolicy: Always
  replicaCount: 1
  port: 3001
  env:
    PUPPETEER_EXECUTABLE_PATH: /usr/lib/chromium/chromium
    RUST_LOG: info

secretName: devinlittle-net-secrets
imagePullSecret: registry-creds

ingress:
  enabled: true
  hostname: api.exmaple.com
  annotations:
    kubernetes.io/ingress.class: nginx
