postgresql:
  enabled: true
  auth:
    username: devin
    password: password
    database: auth
  gg:
    database: gg

auth_backend:
  image:
    repository: 10.10.10.245:5000/devin/auth_backend
    tag: "latest"
    pullPolicy: Always
  replicaCount: 1
  port: 3000
  env:
    RUST_LOG: info


gradegetter_backend:
  image:
    repository: 10.10.10.245:5000/devin/gradegetter_backend
    tag: "latest"
    pullPolicy: Always
  replicaCount: 1
  port: 3002
  env:
    RUST_LOG: info

gradegetter:
  image:
    repository: 10.10.10.245:5000/devin/gradegetter
    tag: "latest"
    pullPolicy: Always
  replicaCount: 1
  port: 3001
  env:
    PUPPETEER_EXECUTABLE_PATH: /usr/lib/chromium/chromium
    RUST_LOG: info

secretName: gradegetter-secrets
imagePullSecret: registry-creds

ingress:
  enabled: true
  auth: 
    host: auth.exmaple.com
  gradegetter:
    host: gradegetter.exmaple.com
  annotations:
    kubernetes.io/ingress.class: nginx
